name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk-check:
    name: SDK Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rill-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

  backend-check:
    name: Backend Install Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rill-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify entrypoint imports
        run: bun -e "import './src/core/config.ts'; import './src/index.ts'; console.log('ok')"
